<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — Faisalabad Trade Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
<div class="auth-card">
  <h1>Create Account</h1>
  <p class="subtitle">Join Faisalabad's export & manufacturing community</p>

  <div id="errorMsg" class="alert alert-error" style="display:none"></div>

  <form id="registerForm">
    <div class="form-group">
      <label>Company Name</label>
      <input type="text" class="form-input" id="company_name" placeholder="Faisalabad Textiles Ltd" required>
    </div>
    <div class="form-group">
      <label>Contact Person</label>
      <input type="text" class="form-input" id="contact_person" placeholder="Your full name" required>
    </div>
    <div class="grid-2" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group">
        <label>Email</label>
        <input type="email" class="form-input" id="email" placeholder="you@company.com" required>
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="tel" class="form-input" id="phone" placeholder="+92 3XX XXXXXXX" required>
      </div>
    </div>
    <div class="form-group">
      <label>City</label>
      <input type="text" class="form-input" id="city" value="Faisalabad">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" class="form-input" id="password" placeholder="Min 8 characters" minlength="8" required>
    </div>
    <button type="submit" class="btn btn-primary btn-block btn-lg mt-16" id="submitBtn">
      Create Account
    </button>
  </form>

  <div class="auth-link">
    Already registered? <a href="login.html">Sign in</a>
  </div>
  <div class="auth-link" style="margin-top:8px">
    <a href="public-dashboard.html">← Back to Public Dashboard</a>
  </div>
</div>

<script src="js/api.js"></script>
<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Creating account...';
  document.getElementById('errorMsg').style.display = 'none';

  try {
    const res = await api.register({
      email: document.getElementById('email').value,
      password: document.getElementById('password').value,
      company_name: document.getElementById('company_name').value,
      contact_person: document.getElementById('contact_person').value,
      phone: document.getElementById('phone').value,
      city: document.getElementById('city').value,
    });
    api.setToken(res.access_token);
    api.setUser(res.user);
    window.location.href = 'dashboard.html';
  } catch (err) {
    document.getElementById('errorMsg').textContent = err.message;
    document.getElementById('errorMsg').style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
});
</script>
</body>
</html>
