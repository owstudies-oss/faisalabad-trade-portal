<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Faisalabad Trade Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
<div class="auth-card">
  <h1>Welcome Back</h1>
  <p class="subtitle">Sign in to your Faisalabad Trade Portal account</p>

  <div id="errorMsg" class="alert alert-error" style="display:none"></div>
  <div id="successMsg" class="alert alert-success" style="display:none"></div>

  <form id="loginForm">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" class="form-input" id="email" placeholder="you@company.com" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" class="form-input" id="password" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn btn-primary btn-block btn-lg mt-16" id="submitBtn">
      Sign In
    </button>
  </form>

  <div class="auth-link">
    Don't have an account? <a href="register.html">Create one</a>
  </div>
  <div class="auth-link" style="margin-top:8px">
    <a href="public-dashboard.html">← Back to Public Dashboard</a>
  </div>
</div>

<script src="js/api.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  document.getElementById('errorMsg').style.display = 'none';

  try {
    const res = await api.login({
      email: document.getElementById('email').value,
      password: document.getElementById('password').value,
    });
    api.setToken(res.access_token);
    api.setUser(res.user);
    window.location.href = 'dashboard.html';
  } catch (err) {
    document.getElementById('errorMsg').textContent = err.message;
    document.getElementById('errorMsg').style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
});
</script>
</body>
</html>
