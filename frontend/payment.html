<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment — Faisalabad Trade Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
<div class="auth-card" style="max-width:520px">
  <h1>Complete Payment</h1>
  <p class="subtitle">Subscribe to your chosen package</p>

  <div id="errorMsg" class="alert alert-error" style="display:none"></div>
  <div id="successMsg" class="alert alert-success" style="display:none"></div>

  <div class="card" style="margin-bottom:20px;background:var(--slate-50)" id="orderSummary">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div><strong>Package:</strong> <span id="pkgName">—</span></div>
      <div style="font-size:24px;font-weight:800;color:var(--green-700)"><span id="pkgPrice">—</span></div>
    </div>
  </div>

  <form id="paymentForm">
    <div class="form-group">
      <label>Payment Method</label>
      <select class="form-select" id="paymentMethod" required>
        <option value="">Select a method...</option>
        <option value="jazzcash">JazzCash</option>
        <option value="easypaisa">Easypaisa</option>
        <option value="bank_transfer">Bank Transfer</option>
        <option value="card">Credit / Debit Card</option>
      </select>
    </div>

    <div id="cardDetails" style="display:none">
      <div class="form-group">
        <label>Card Number</label>
        <input type="text" class="form-input" id="cardNumber" placeholder="4242 4242 4242 4242" maxlength="19">
      </div>
      <div class="grid-2" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label>Expiry</label>
          <input type="text" class="form-input" id="cardExpiry" placeholder="MM/YY" maxlength="5">
        </div>
        <div class="form-group">
          <label>CVV</label>
          <input type="text" class="form-input" id="cardCvv" placeholder="123" maxlength="4">
        </div>
      </div>
    </div>

    <p style="font-size:12px;color:var(--slate-400);margin-bottom:16px">
      🔒 Your payment is encrypted and processed securely.
    </p>

    <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">
      Pay Now
    </button>
  </form>

  <div class="auth-link" style="margin-top:16px">
    <a href="packages.html">← Back to Packages</a>
  </div>
</div>

<script src="js/api.js"></script>
<script>
// Check auth
const token = api.getToken();
if (!token) {
  window.location.href = 'login.html?redirect=payment';
}

const urlParams = new URLSearchParams(window.location.search);
const pkgSlug = urlParams.get('package');

async function loadPkg() {
  if (!pkgSlug) { document.getElementById('errorMsg').textContent = 'No package selected'; document.getElementById('errorMsg').style.display = 'block'; return; }
  try {
    const pkgs = await api.getPackages();
    const pkg = pkgs.find(p => p.slug === pkgSlug);
    if (!pkg) throw new Error('Package not found');
    document.getElementById('pkgName').textContent = pkg.name;
    document.getElementById('pkgPrice').textContent = `PKR ${pkg.price_pkr.toLocaleString()}`;
    document.getElementById('paymentForm').dataset.price = pkg.price_pkr;
    document.getElementById('paymentForm').dataset.slug = pkgSlug;
  } catch (e) {
    document.getElementById('errorMsg').textContent = e.message;
    document.getElementById('errorMsg').style.display = 'block';
  }
}

document.getElementById('paymentMethod').addEventListener('change', function() {
  document.getElementById('cardDetails').style.display = this.value === 'card' ? 'block' : 'none';
});

document.getElementById('paymentForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Processing...';
  document.getElementById('errorMsg').style.display = 'none';

  const method = document.getElementById('paymentMethod').value;
  if (!method) {
    document.getElementById('errorMsg').textContent = 'Please select a payment method';
    document.getElementById('errorMsg').style.display = 'block';
    btn.disabled = false; btn.textContent = 'Pay Now';
    return;
  }

  const data = { package_slug: e.target.dataset.slug, method };
  if (method === 'card') {
    data.card_number = document.getElementById('cardNumber').value;
    data.card_expiry = document.getElementById('cardExpiry').value;
    data.card_cvv = document.getElementById('cardCvv').value;
  }

  try {
    const res = await api.subscribe(data);
    document.getElementById('successMsg').innerHTML = `
      <strong>✅ ${res.message}</strong><br>
      Transaction Ref: <code>${res.transaction_ref}</code><br>
      Amount: PKR ${res.amount_pkr.toLocaleString()}
    `;
    document.getElementById('successMsg').style.display = 'block';
    btn.textContent = 'Redirecting...';
    setTimeout(() => window.location.href = 'dashboard.html', 2000);
  } catch (err) {
    document.getElementById('errorMsg').textContent = err.message;
    document.getElementById('errorMsg').style.display = 'block';
    btn.disabled = false; btn.textContent = 'Pay Now';
  }
});

loadPkg();
</script>
</body>
</html>
